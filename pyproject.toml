python-dotenv = "^1.1.0"
requests = "^2.32.5"
pillow = "^11.2.1"
pyyaml = "^6.0.2"
toml = "^0.10.2"
ftfy = "^6.3.1"
questionary = "^2.1.1"
pymupdf = "^1.26.4"
edge-tts = "^7.2.7"
ebooklib = "^0.20"
beautifulsoup4 = "^4.14.3"
tenacity = "^8.2.3"

[tool.poetry.group.elevenlabs]
optional = true

[tool.poetry.group.elevenlabs.dependencies]
elevenlabs = "^1.0.0"

[tool.poetry.group.google-cloud-tts]
optional = true

[tool.poetry.group.google-cloud-tts.dependencies]
google-cloud-texttospeech = "^2.17.2"

[tool.poetry.group.google-translate]
optional = true

[tool.poetry.group.google-translate.dependencies]
gtts = "^2.4.0"

[tool.poetry.group.pyttsx3]
optional = true

[tool.poetry.group.pyttsx3.dependencies]
pyttsx3 = "^2.90"

[tool.poetry.group.dev.dependencies]
hypothesis = "^6.138.13"
types-pyyaml = "^6.0.12.20250915"
types-toml = "^0.10.8.20240310"
ruff = "^0.14.0"
black = "^25.9.0"
codespell = "^2.4.1"
