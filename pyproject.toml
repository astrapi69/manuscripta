[tool.poetry.group.test.dependencies]
hypothesis = ">=6,<7"
pytest = "^8.2"
pytest-mock = "^3.10.0"
pytest-cov = "^4.1.0"

[tool.poetry.group.mutation]
optional = true

[tool.poetry.group.mutation.dependencies]
mutmut = "^3.5"

# --- Mutation testing -------------------------------------------------------
# Policy and rationale: docs/decisions/0002-mutation-testing.md
# Scope and response protocol: docs/TESTING.md §14
#
# Mutation testing is ORTHOGONAL to the test pyramid — a meta-test that
# grades whether unit tests actually assert behaviour or just exercise
# code paths. It runs nightly in CI (not per-PR) and does NOT block
# merges. See TESTING.md §14 for the response-to-survivor workflow.

[tool.mutmut]
# Explicit list of in-scope modules (no globs — consistency with the
# coverage threshold contract in TESTING.md §3).
paths_to_mutate = [
    # Per ADR-0002 "Initial in-scope list" — 7 modules. Adding/removing
    # an entry requires updating ADR-0002, this list, and TESTING.md §14.
    # markdown/german_quotes is intentionally NOT here: it is currently
    # debt-tracked at 84 % coverage (target 85 %), and ADR-0002's
    # debt-graduation rule excludes debt modules from mutation scope.
    # Add it back in the same commit that removes it from
    # baseline-coverage.json.
    "src/manuscripta/exceptions.py",
    "src/manuscripta/paths/to_absolute.py",
    "src/manuscripta/paths/to_relative.py",
    "src/manuscripta/images/convert.py",
    "src/manuscripta/markdown/normalize_toc.py",
    "src/manuscripta/audiobook/tts/text_chunking.py",
    # src/manuscripta/audiobook/tts/retry.py removed — insufficient
    # mutable surface per ADR-0002 §"Score formula treatment of
    # trampoline-induced equivalence". All three mutmut-3.x mutants
    # (default-value changes on with_retry's signature) are §14.8.3-
    # equivalent; annotations are retained in .mutmut/equivalent.yaml
    # as audit history. Re-add when the module grows additional
    # testable surface OR when a future mutmut release exposes
    # default-argument mutations.
]

# Drive mutants through the unit layer only. The integration, e2e, and
# e2e_wheel layers are pyramid-inappropriate for this tool: their tests
# shell out to external binaries that every mutant would have to run.
# Per ADR-0002 §Rationale, mutation on CORE modules via unit tests is
# the only productive combination.
tests_dir = ["tests/unit"]

# Forward markers so the enforcement hook in conftest.py is happy and
# deselects non-unit tests. The ``-x`` is mutmut's documented
# fail-fast expectation.
#
# Deselects:
#   tests/unit/test_normalize_toc_links.py — legacy subprocess-driving
#       tests; mutmut's instrumentation cannot reach into spawned
#       subprocesses, so they collide with the runner. The newer
#       tests/unit/test_normalize_toc_direct.py covers the same
#       module via direct calls and contributes the mutation kills.
pytest_add_cli_args = [
    "-m", "unit",
    "-x",
    "--no-cov",
    "--deselect=tests/unit/test_normalize_toc_links.py",
    # tests/unit/test_generate_audiobook_use_cases.py is the polluter
    # documented in docs/TESTING.md §12 "Known environmental test
    # flakiness". It uses plain setattr(...) on the manuscripta.audiobook
    # .tts module without teardown, breaking adapter tests later in the
    # same process. Mutmut runs the full suite per mutant; the pollution
    # is more visible there than in normal test runs because mutmut keeps
    # the same Python process. Phase 6 cleanup will swap the polluter to
    # monkeypatch.setattr; remove this deselect entry then.
    "--deselect=tests/unit/test_generate_audiobook_use_cases.py",
    "--deselect=tests/unit/test_generate_audiobook.py",
]

# Only mutate lines that coverage.py reports as covered by at least one
# test. Mutating uncovered lines produces guaranteed survivors that
# tell us nothing we don't already see in the coverage report.
mutate_only_covered_lines = true

# Skip the polluter that blocks TTS tests (see TESTING.md §12 "Known
# environmental test flakiness"). The polluter is a test-file issue,
# not a library bug; once Phase 6 cleanup fixes it, remove this entry.
do_not_mutate = []

# mutmut mirrors only paths_to_mutate into mutants/ by default, which
# breaks any test that imports another module of the package. Copying
# the full src tree + the test helpers keeps test imports satisfied.
also_copy = ["src/", "tests/"]

# Per-module mutation-score thresholds. The check script reads this
# section. Targets differ by module category per ADR-0002:
#   - exceptions (trivially testable): 95%
#   - pure transforms (convert.*, fix_german_quotes, normalize_toc):  85%
#   - tts text_chunking / retry:                                       80%
#   - modules added later without a specific entry:                    75%
# Reducing any threshold here requires an ADR (same policy as coverage
# thresholds — see TESTING.md §3 and ADR-0003).

[tool.manuscripta.mutation_thresholds]
default = 75
"src/manuscripta/exceptions.py" = 95
"src/manuscripta/paths/to_absolute.py" = 85
"src/manuscripta/paths/to_relative.py" = 85
"src/manuscripta/images/convert.py" = 85
"src/manuscripta/markdown/normalize_toc.py" = 85
"src/manuscripta/audiobook/tts/text_chunking.py" = 80
# "src/manuscripta/audiobook/tts/retry.py" = 80 — removed alongside
# its paths_to_mutate entry above (§14.8.3 insufficient mutable
# surface). Restore this line to 80 when the module re-enters scope.
# Threshold for markdown/german_quotes is intentionally absent until
# the module exits the coverage debt table (per ADR-0002 §debt-
# graduation rule). When re-added: 85 % per the "pure transforms"
# tier in the same ADR.

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=manuscripta --cov-report=term-missing"
pythonpath = ["src"]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_implicit_optional = false
check_untyped_defs = false
warn_unused_ignores = false
allow_redefinition = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
check_untyped_defs = false

[tool.ruff]
fix = true
unsafe-fixes = true

[tool.ruff.lint.per-file-ignores]
# Tests use `pytestmark = pytest.mark.<layer>` between `import pytest` and the
# rest of the imports to declare layer membership. This is mandatory project
# convention (TESTING.md §13 layer-marker enforcement). E402 fires on every
# import after the assignment; per-file ignore is the documented waiver.
"tests/**/*.py" = ["E402"]

[tool.codespell]
ignore-words-list = "prozess"
