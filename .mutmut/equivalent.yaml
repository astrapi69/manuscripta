# ---------------------------------------------------------------------------
# §14.8.3 — trampoline-induced equivalence on audiobook.tts.retry.with_retry
# ---------------------------------------------------------------------------
# All three mutants change a default parameter value in the signature of
# with_retry. mutmut 3.x rewrites the function into a trampoline that
# resolves the *original* signature's defaults at the wrapper level and
# forwards concrete args to the selected mutant, so the mutant's own
# default is never consulted. Behaviour is identical to the original by
# construction. See docs/TESTING.md §14.8.3 for the full derivation and
# docs/decisions/0002-mutation-testing.md §"Score formula treatment of
# trampoline-induced equivalence" for the companion ADR note.

