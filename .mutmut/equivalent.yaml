# --- Ad-hoc cluster #2: regex cannot emit blank sentence mid-list ---
# Reasoning (mutant 24 only): the producing regex
# re.split(r'(?<=[.!?])\s+', ...) requires a preceding punctuation
# character AND at least one following whitespace character to emit a
# split point. A blank element can appear in the result list only as a
# trailing tail (when the input ends in `.?! \s+`), never mid-list.
# Therefore `continue` and `break` on a blank sentence differ only at
# the already-terminating element, where both behave identically. Not
# §14.8: this is a property of the specific regex, not a standing
# policy about sentence text.
#
# mutant 24: line-43 sentence-loop `if not sentence.strip(): continue`
#            -> `break`
src/manuscripta/audiobook/tts/text_chunking.py:manuscripta.audiobook.tts.text_chunking.x_split_text_into_chunks__mutmut_24

# --- Ad-hoc cluster #3: range(0, n, n) == [0] degenerate ---
# Reasoning (mutant 37 only): at the boundary len(sentence) == max_chars,
# the orig else-branch assigns current_chunk = sentence (a string of
# length max_chars) and the mutant hard-split iterates
# range(0, max_chars, max_chars) == [0], appending sentence[0:max_chars]
# (the whole sentence) to chunks. Any subsequent concatenation attempt in
# orig yields candidate length > max_chars (current_chunk already equals
# max_chars; any non-empty addition exceeds), so the orig's
# current_chunk = sentence is inevitably pushed intact on the next
# iteration. The final chunks list is identical either way. Not §14.8:
# this is range-arithmetic at the len == max_chars edge, not a standing
# policy about slicing.
#
# mutant 37: line-51 `if len(sentence) > max_chars:` -> `>= max_chars:`
