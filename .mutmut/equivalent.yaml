# ---------------------------------------------------------------------------
# ADR-0004 / §14.8.2 — exception __str__() format is diagnostic, not
# contractual — on src/manuscripta/exceptions.py
# ---------------------------------------------------------------------------
# Per ADR-0004, the rendered text of these exceptions (the message passed to
# super().__init__, i.e. what str(e) produces) is a human-readable diagnostic
# aid, not an API surface. Mutations that only perturb the rendered string —
# separator literals, snippet-slice bounds, or replacing the message entirely
# with None — do not change the attribute-level contract that library
# consumers pin against (.returncode / .stderr / .cmd / .missing /
# .unresolved / .source_dir / .reason). See docs/TESTING.md §14.8.2 for the
# inline-annotation convention this file complements; the A-category
# attribute contracts are pinned in tests/unit/test_exceptions.py.

