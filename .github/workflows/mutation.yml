name: mutation-nightly

# Phase 4b nightly mutation-testing run. Policy: docs/decisions/0002-mutation-testing.md
# Never merge-blocking; the score is a quality signal, not a gate.
# Audit-on-success: docs/audits/current-mutation.md is rotated and rewritten on
# every successful run, regardless of regression status, so the absence of an
# audit means the cron broke (not that everything is fine).

on:
  schedule:
    # 03:00 UTC daily — quiet window for most contributor timezones
    - cron: "0 3 * * *"
  workflow_dispatch: {}  # manual trigger from the Actions tab

permissions:
  contents: write   # commit the rotated audit file
  issues:  write    # open / comment on a regression-tracking issue

concurrency:
  group: mutation-nightly
  cancel-in-progress: false

jobs:
  mutation:
    name: mutation testing (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Phase 4b stop-rule: full scope under 45 min;
                          # 60 min ceiling allows for CI-runner variance.

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so the audit commit is not orphaned

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Poetry installation
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install Poetry
        run: |
          pipx install poetry || python -m pip install --user poetry

      - name: Install dependencies (with mutation group)
        run: |
          poetry install --with test --with mutation --no-interaction

      - name: Install Pandoc
        # Pandoc is needed to satisfy module-import side effects in the unit
        # suite even though mutation-scope modules are pure-logic.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pandoc

      - name: Run mutation tests (full scope)
        id: mutation
        run: |
          set +e
          poetry run mutmut run
          mutmut_rc=$?
          set -e
          # mutmut returns non-zero when there are surviving mutants. We
          # don't fail the workflow on that — survivors are the input to
          # the response protocol, not a build error.
          echo "mutmut_rc=$mutmut_rc" >> "$GITHUB_OUTPUT"

      - name: Enforce per-module thresholds
        id: thresholds
        run: |
          set +e
          poetry run python scripts/check_mutation_thresholds.py | tee threshold-report.txt
          thr_rc=${PIPESTATUS[0]}
          set -e
          echo "thr_rc=$thr_rc" >> "$GITHUB_OUTPUT"
          # Save threshold output for the audit file step.
          mv threshold-report.txt /tmp/mutation-threshold-report.txt

      - name: Render mutation audit
        # Run unconditionally so the audit reflects the run even on threshold
        # regression. This is the audit-on-success rule from ADR-0002.
        if: always()
        run: |
          poetry run mutmut export-cicd-stats
          # mutmut writes its global stats to mutants/mutmut-cicd-stats.json
          today="$(date -u +%Y-%m-%d)"
          audit_dir="docs/audits"
          history_dir="$audit_dir/history"
          mkdir -p "$history_dir"

          # Rotate previous current-mutation.md into history/ if its
          # `Audit date:` header survives. (Same rotation contract as
          # docs/audits/current-coverage.md per TESTING.md §3.)
          if [ -f "$audit_dir/current-mutation.md" ]; then
            prev_date="$(grep -m1 '^Audit date:' "$audit_dir/current-mutation.md" \
                          | sed 's/^Audit date:[[:space:]]*//')"
            if [ -n "$prev_date" ]; then
              mv "$audit_dir/current-mutation.md" \
                 "$history_dir/${prev_date}-mutation.md"
            fi
          fi

          # Write fresh audit.
          {
            echo "# Mutation testing audit"
            echo
            echo "Audit date: $today"
            echo "Generated by: .github/workflows/mutation.yml @ $(git rev-parse --short HEAD)"
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "## Per-module thresholds"
            echo
            echo '```'
            cat /tmp/mutation-threshold-report.txt
            echo '```'
            echo
            echo "## Global statistics (from mutmut export-cicd-stats)"
            echo
            echo '```json'
            cat mutants/mutmut-cicd-stats.json 2>/dev/null || echo '{}'
            echo '```'
            echo
            echo "## Surviving mutants"
            echo
            echo '```'
            poetry run mutmut results 2>/dev/null | grep -vE ': not checked$' || echo "(none)"
            echo '```'
            echo
            echo "## Outcome"
            echo
            if [ "${{ steps.thresholds.outputs.thr_rc }}" = "0" ]; then
              echo "All in-scope modules met their mutation thresholds."
            else
              echo "Threshold regression — see above. Triage per docs/TESTING.md §14.5 (A/B/C/D)."
            fi
          } > "$audit_dir/current-mutation.md"

      - name: Commit rotated audit
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "manuscripta-mutation-bot"
          git config user.email "actions-bot@users.noreply.github.com"
          git add docs/audits/current-mutation.md docs/audits/history/ || true
          if git diff --staged --quiet; then
            echo "Audit unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "$(printf 'docs(audit): nightly mutation audit %s\n\nAuto-generated by .github/workflows/mutation.yml.\nThreshold gate exit code: %s\n' \
                         "$(date -u +%Y-%m-%d)" \
                         "${{ steps.thresholds.outputs.thr_rc }}")"
          git push origin HEAD:${{ github.ref_name }}

      - name: Open issue on threshold regression
        if: always() && steps.thresholds.outputs.thr_rc != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today="$(date -u +%Y-%m-%d)"
          gh issue create \
            --title "mutation: per-module threshold regression $today" \
            --label "mutation,quality,nightly" \
            --body "$(printf 'The nightly mutation run on %s found one or more modules below their configured threshold.\n\nAudit: docs/audits/current-mutation.md (commit %s)\n\nWorkflow run: %s/%s/actions/runs/%s\n\nTriage per docs/TESTING.md §14.5 (A/B/C/D categories). Do not silently lower thresholds; do not pin mutation-targeting literals.\n' \
                         "$today" \
                         "$(git rev-parse --short HEAD)" \
                         "${{ github.server_url }}" \
                         "${{ github.repository }}" \
                         "${{ github.run_id }}")"

      # Final exit: succeed unless something genuinely broke (e.g. mutmut
      # itself crashed). Threshold-only regressions don't fail the workflow,
      # per ADR-0002 "never merge-blocking" — the audit + the issue are the
      # output, not a red X.
      - name: Workflow exit
        if: always()
        run: |
          echo "mutmut_rc=${{ steps.mutation.outputs.mutmut_rc }}"
          echo "threshold_rc=${{ steps.thresholds.outputs.thr_rc }}"
          # Non-numeric or truly-broken mutmut → fail. Surviving-mutant exit
          # codes (1/non-zero with audit produced) → succeed.
          if [ -z "${{ steps.mutation.outputs.mutmut_rc }}" ]; then
            echo "mutmut step did not produce an exit code — workflow infrastructure broken"
            exit 1
          fi
          exit 0
